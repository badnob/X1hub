<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>X1 Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #05060a;
      color: #fff;
      overflow: hidden;
    }

    .split-container {
      display: flex;
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    .side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      transition: flex 0.35s ease, filter 0.35s ease, transform 0.35s ease;
      overflow: hidden;
    }

    .side::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.18;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    /* Left side: home-5020064604 */
    .side-left {
      background: radial-gradient(circle at top left, #1a68ff 0%, #05060a 55%, #000 100%);
      border-right: 1px solid rgba(255,255,255,0.12);
    }
    .side-left::before {
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,0.3) 0, transparent 55%),
        radial-gradient(circle at 90% 80%, rgba(23,227,255,0.35) 0, transparent 60%);
    }

    /* Right side: x1nerator */
    .side-right {
      background: radial-gradient(circle at top right, #ff1744 0%, #2b0014 48%, #05060a 100%);
      border-left: 1px solid rgba(255,255,255,0.12);
    }
    .side-right::before {
      background-image:
        radial-gradient(circle at 80% 10%, rgba(255,255,255,0.35) 0, transparent 55%),
        radial-gradient(circle at 15% 85%, rgba(255,111,0,0.5) 0, transparent 60%);
    }

    .side:hover {
      flex: 1.2;
      filter: brightness(1.1);
      transform: scale(1.01);
      z-index: 2;
    }

    .side-content {
      position: relative;
      text-align: center;
      padding: 1.5rem;
      z-index: 1;
    }

    .side-title {
      font-size: clamp(1.6rem, 2.4vw, 2.4rem);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .side-sub {
      font-size: clamp(0.85rem, 1vw, 1rem);
      opacity: 0.8;
      max-width: 20rem;
      margin: 0 auto;
    }

    .side-indicator {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .center-hub {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .hub-inner {
      width: min(40vw, 360px);
      max-width: 380px;
      position: relative;
      pointer-events: auto;
    }

    .hub-inner img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 18px;
      box-shadow:
        0 0 30px rgba(0,0,0,0.7),
        0 0 80px rgba(255,255,255,0.15);
      transition:
        transform 0.4s ease,
        filter 0.4s ease,
        box-shadow 0.4s ease;
    }

    .hub-inner::before {
      content: "";
      position: absolute;
      inset: -10%;
      border-radius: 26px;
      background: conic-gradient(from 190deg, #1a68ff, #ff1744, #ffeb3b, #1a68ff);
      opacity: 0.3;
      filter: blur(24px);
      z-index: -1;
      transition: opacity 0.4s ease, filter 0.4s ease;
    }

    .hub-inner.hover-left img {
      filter: hue-rotate(-15deg) saturate(1.2);
      transform: translateX(-8px) scale(1.03);
      box-shadow:
        0 0 40px rgba(0,128,255,0.7),
        0 0 120px rgba(0,200,255,0.4);
    }

    .hub-inner.hover-right img {
      filter: hue-rotate(20deg) saturate(1.35);
      transform: translateX(8px) scale(1.03);
      box-shadow:
        0 0 40px rgba(255,23,68,0.8),
        0 0 120px rgba(255,111,0,0.55);
    }

    .hub-inner.hover-left::before {
      opacity: 0.5;
      filter: blur(26px) saturate(1.2);
    }

    .hub-inner.hover-right::before {
      opacity: 0.6;
      filter: blur(26px) saturate(1.4);
    }

    .hub-label {
      position: absolute;
      bottom: -2.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.8;
      text-align: center;
      white-space: nowrap;
    }

    .hub-label span {
      opacity: 0.7;
    }

    /* Click cue on mobile */
    @media (max-width: 768px) {
      .split-container {
        flex-direction: column;
      }
      .side {
        flex: 1;
      }
      .side:hover {
        transform: none;
        filter: none;
        flex: 1;
      }
      .center-hub {
        pointer-events: none;
      }
      .hub-label {
        bottom: -2rem;
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>
  <div class="split-container">
    <!-- LEFT SIDE -->
    <div class="side side-left"
         data-target="https://home-5020064604.app-ionos.space/">
      <div class="side-content">
        <div class="side-title">HOME SPACE</div>
        <div class="side-sub">
          Calm control surface, structured tools, and your base of operations.
        </div>
        <div class="side-indicator">ENTER</div>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="side side-right"
         data-target="https://x1nerator.xyz/">
      <div class="side-content">
        <div class="side-title">X1NERATOR</div>
        <div class="side-sub">
          High‑octane X1 energy, drops, and the wild side of the network.
        </div>
        <div class="side-indicator">LAUNCH</div>
      </div>
    </div>

    <!-- CENTER HUB IMAGE -->
    <div class="center-hub">
      <div class="hub-inner" id="hub">
        <img src="IronMan-X1.jpg" alt="X1 Hub" />
        <div class="hub-label">
          <span>MOVE OR TAP LEFT / RIGHT TO SHIFT AURA</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const sides = document.querySelectorAll(".side");
    const hub = document.getElementById("hub");

    function clearHubState() {
      hub.classList.remove("hover-left", "hover-right");
    }

    sides.forEach(side => {
      const target = side.getAttribute("data-target");

      side.addEventListener("mouseenter", () => {
        if (side.classList.contains("side-left")) {
          hub.classList.add("hover-left");
          hub.classList.remove("hover-right");
        } else {
          hub.classList.add("hover-right");
          hub.classList.remove("hover-left");
        }
      });

      side.addEventListener("mouseleave", () => {
        clearHubState();
      });

      side.addEventListener("click", () => {
        window.location.href = target;
      });
    });

    // Also react when the pointer moves across the center from anywhere
    document.addEventListener("mousemove", (e) => {
      const width = window.innerWidth;
      if (width <= 768) return; // keep it simple on mobile

      if (e.clientX < width / 2) {
        hub.classList.add("hover-left");
        hub.classList.remove("hover-right");
      } else {
        hub.classList.add("hover-right");
        hub.classList.remove("hover-left");
      }
    });
  </script>
</body>
</html>
